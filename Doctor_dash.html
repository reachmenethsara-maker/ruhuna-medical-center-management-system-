<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard</title>
    <link rel="stylesheet" href="Doctor dash.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <img src="mc.png" alt="MC Logo">
        </div>
        <h2>STAFF</h2>
        <ul>
            <li class="active"><i class="fas fa-users"></i> Dashboard</li>
            <li><i class="fas fa-user-injured"></i> My Patient </li>
            
            <li><i class="fas fa-calendar-check"></i> My Appointment Manag</li>
             <li><i class="fas fa-user-doctor"></i>  Test Report Mange</li>
            <li><i class="fas fa-cog settings-icon"></i>Setting</li>
            <li class="logout"><i class="fas fa-sign-out-alt"></i> Logout</li>
        </ul>
    </div>

    <div class="main">
        <div class="topbar">
            <h2>Hospital Doctor Dashboard</h2>
            <div>Doctor</div>
        </div>

        <div class="cards">
            <div class="card blue">
                <i class="fas fa-users"></i>
                <h2> My Patients</h2>
                <p>Manage Patients</p>
            </div>
            <div class="card green">
                <i class="fas fa-user-doctor"></i>
                <h2>My Appointment</h2>
                <p> Appointment Manage </p>
            </div>
     <div class="card orange">
    <i class="fas fa-file-medical-alt"></i>
    <h2>Report Management</h2>
    <p>View and Manage Medical Reports</p>
</div>

        </div>
    </div>
</body>
</html>
